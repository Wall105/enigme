<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>L'Énigme des 1900 Subs - Angle Cinématique 3D</title>
    <style>
        /* Polices mystérieuses et élégantes */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* La perspective est la clé pour donner la profondeur à l'inclinaison */
            perspective: 1200px; 
        }

        /* Vignettage et fond */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(30, 20, 10, 0.4) 0%, rgba(0, 0, 0, 1) 85%);
            z-index: 0;
            pointer-events: none;
        }

        /* Bandes noires cinématiques (haut et bas) */
        .cinema-bars::before, .cinema-bars::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 12vh;
            background: #000;
            z-index: 50;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            pointer-events: none;
        }
        .cinema-bars::before { top: 0; }
        .cinema-bars::after { bottom: 0; }

        /* Effet de brouillard en arrière-plan */
        .fog {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
            background-size: 200% 100%;
            opacity: 0.15;
            animation: fogMove 60s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes fogMove { 
            0% { background-position: 0 0; } 
            100% { background-position: -200% 0; } 
        }

        /* Générateur de Particules Magiques (Braises) */
        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: #ffb700;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb700, 0 0 20px #ffaa00;
            opacity: 0;
            animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Conteneur principal (Incliné façon screenshot + Parallax CSS constant) */
        .container {
            text-align: center;
            z-index: 10;
            max-width: 1100px;
            padding: 70px 50px;
            background: rgba(15, 12, 10, 0.5);
            border: 1px solid rgba(255, 183, 0, 0.15);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255, 183, 0, 0.05);
            border-radius: 4px;
            display: flex; 
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(8px);
            opacity: 0; 
            transform-style: preserve-3d;
            /* L'animation qui le fait flotter doucement tout en gardant l'angle */
            animation: floatTilted 8s infinite alternate ease-in-out;
            transition: opacity 2s ease-in-out, box-shadow 3s ease;
        }
        
        /* L'animation d'inclinaison (rotateY(-22deg) donne le côté gauche plus proche) */
        @keyframes floatTilted {
            0% { transform: rotateY(-22deg) rotateX(6deg) rotateZ(-1deg) translateY(0px); }
            100% { transform: rotateY(-18deg) rotateX(8deg) rotateZ(-2deg) translateY(-15px); }
        }

        /* Classe ajoutée à la fin pour embraser la boîte */
        .container.glow-up {
            box-shadow: 0 0 100px rgba(0, 0, 0, 1), inset 0 0 80px rgba(255, 183, 0, 0.15), 0 0 40px rgba(255, 183, 0, 0.2);
            border-color: rgba(255, 183, 0, 0.4);
        }

        /* Titre */
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 55px;
            color: #ffb700;
            text-shadow: 0 0 40px rgba(255, 183, 0, 0.5);
            margin-top: 0;
            margin-bottom: 40px;
            letter-spacing: 12px;
            opacity: 0.9;
            transform: translateZ(40px); /* Pousse le texte en dehors de l'écran 3D */
        }

        /* Phrases de l'énigme (BLUR FADE) */
        .line {
            font-size: 40px;
            margin: 25px 0;
            color: #f2e6d0;
            font-style: italic;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            opacity: 0; 
            filter: blur(15px);
            transform: translateY(20px) translateZ(30px); /* 3D Pop */
            transition: all 3s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .line.show {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(0) translateZ(30px);
        }

        /* Bouton de lancement */
        .btn-wrapper {
            position: absolute;
            z-index: 20;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
        .btn-start {
            padding: 20px 60px;
            font-size: 24px;
            background: rgba(255, 183, 0, 0.05);
            color: #ffb700;
            border: 1px solid #ffb700;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 5px;
            transition: all 0.4s ease;
            box-shadow: 0 0 30px rgba(255, 183, 0, 0.1);
            text-transform: uppercase;
        }
        .btn-start:hover {
            background: rgba(255, 183, 0, 0.2);
            box-shadow: 0 0 50px rgba(255, 183, 0, 0.5);
            text-shadow: 0 0 15px #ffb700;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="cinema-bars">

<div class="vignette"></div>
<div class="fog"></div>
<div id="particles"></div>

<audio id="bg-music" src="suspens.mp3" preload="auto" loop></audio>
<audio id="voice-audio" src="voixofff.mp3" preload="auto"></audio>

<div class="btn-wrapper" id="btn-wrapper">
    <button class="btn-start" onclick="startEnigma()">Révéler l'énigme</button>
</div>

<div class="container" id="enigma-box">
    <h1>L'Énigme du Palier 1900</h1>
    <div class="line" id="l1">"Je suis différent chaque jour, mais les meilleurs me rendent constant."</div>
    <div class="line" id="l2">"On croit que je viens avec l'expérience..."</div>
    <div class="line" id="l3">"Je ne dépends pas de ta force, mais de ta constance."</div>
    <div class="line" id="l4">"Les pros me travaillent en silence. Les autres pensent que c'est du talent."</div>
</div>

<script>
    // --- GESTION DES PARTICULES MAGIQUES ---
    function createParticles() {
        const particleContainer = document.getElementById('particles');
        setInterval(() => {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            let size = Math.random() * 4 + 1; 
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            
            let duration = Math.random() * 5 + 5; 
            particle.style.animationDuration = duration + 's';
            
            particleContainer.appendChild(particle);
            
            setTimeout(() => { particle.remove(); }, duration * 1000);
        }, 300); 
    }

    // --- SÉQUENCE PRINCIPALE ---
    function startEnigma() {
        createParticles(); // Lance les particules

        let btnWrapper = document.getElementById('btn-wrapper');
        btnWrapper.style.opacity = '0';
        btnWrapper.style.transform = 'scale(1.2) translateY(-20px)';
        btnWrapper.style.pointerEvents = 'none';

        // Fait apparaître la boîte (l'animation d'inclinaison est gérée en CSS)
        setTimeout(() => {
            document.getElementById('enigma-box').style.opacity = '1';
        }, 1000);

        let bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.15; 
        bgMusic.play().catch(e => console.log("Musique fond bloquée"));

        let voice = document.getElementById('voice-audio');
        voice.volume = 1.0;
        
        setTimeout(() => {
            voice.play().catch(e => console.log("Voix off bloquée"));
        }, 2000);

        // Fade In du son final et illumination
        voice.onended = function() {
            document.getElementById('enigma-box').classList.add('glow-up');

            let fadeAudio = setInterval(function () {
                if (bgMusic.volume < 0.6) {
                    bgMusic.volume = Math.min(0.6, bgMusic.volume + 0.05);
                } else {
                    clearInterval(fadeAudio);
                }
            }, 200); 
        };

        // Apparition des lignes
        setTimeout(() => document.getElementById('l1').classList.add('show'), 2000 + 500);
        setTimeout(() => document.getElementById('l2').classList.add('show'), 2000 + 6000);
        setTimeout(() => document.getElementById('l3').classList.add('show'), 2000 + 10000);
        setTimeout(() => document.getElementById('l4').classList.add('show'), 2000 + 15000);
    }
</script>

</body>
</html>
